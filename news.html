        <a href="index.html#directions">研究方向</a>
        <a href="index.html#about">关于我们</a>

      </nav>
    </div>

  <div class="page-banner">
    <h1>新闻动态</h1>
    <p>News · 课题组最新学术动态、会议通知与成果发布</p>
  </div>

  <section class="section news-page-section">
    <div class="section-inner">
      <div class="news-filter-tabs" id="newsFilters">
        <button class="news-filter-tab active" data-category="all">全部<span class="count" id="count-all"></span></button>
        <button class="news-filter-tab" data-category="论文">论文<span class="count" id="count-paper"></span></button>
        <button class="news-filter-tab" data-category="学术会议">学术会议<span class="count" id="count-conference"></span></button>
        <button class="news-filter-tab" data-category="获奖">获奖<span class="count" id="count-award"></span></button>
      </div>

      <div class="news-list" id="newsList"></div>
    </div>
  </section>

  <footer class="footer" id="contact">
    <div class="footer-inner">
      <div class="footer-grid">
        <div>
          <h4>联系我们</h4>
          <p>通讯地址：上海市闵行区东川路800号 绿色环境楼6楼</p>
          <p>邮政编码：200240</p>
          <p>所属单位：上海交通大学 环境科学与工程学院</p>
        </div>
        <div class="footer-links">
          <h4>友情链接</h4>
          <ul>
            <li><a href="https://www.sjtu.edu.cn" target="_blank" rel="noopener">上海交通大学</a></li>
            <li><a href="https://sese.sjtu.edu.cn" target="_blank" rel="noopener">上海交通大学环境科学与工程学院</a></li>
          </ul>
        </div>
        <div class="footer-links">
          <h4>常用链接</h4>
          <ul>
            <li><a href="https://www.nature.com" target="_blank" rel="noopener">Nature</a></li>
            <li><a href="https://pubs.acs.org" target="_blank" rel="noopener">ACS Publications</a></li>
            <li><a href="https://onlinelibrary.wiley.com" target="_blank" rel="noopener">Wiley Online Library</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>当前版权所有 土壤与地下水污染修复课题组· 上海交通大学环境科学与工程学院</p>
      </div>
    </div>
  </footer>

  <script src="js/news-data.js"></script>
  <script>
    function renderNewsItem(news) {
      const { day, month } = formatNewsDate(news);
      const tagClass = getCategoryClass(news.category);
      const journalLine = news.journal
        ? `<p class="news-journal">发表于《${news.journal}》</p>` : '';
      const authorLine = news.author && news.author !== '课题组'
        ? `<span class="news-author">${news.author}</span>` : '';

      return `
        <a href="news-detail.html?id=${news.id}" class="news-list-item">
          <div class="news-list-date">
            <div class="day">${day}</div>
            <div class="month">${month}</div>
          </div>
          <div class="news-list-body">
            <div class="news-list-meta">
              <span class="news-tag ${tagClass}">${news.category}</span>
              ${authorLine}
            </div>
            <h3>${news.titleZh || news.title}</h3>
            <p class="news-summary">${news.summary}</p>
            ${journalLine}
          </div>
          <span class="news-arrow">→</span>
        </a>`;
    }

    function renderList(category) {
      const items = getNewsByCategory(category);
      document.getElementById('newsList').innerHTML = items.map(renderNewsItem).join('');
    }

    function updateCounts() {
      document.getElementById('count-all').textContent = `(${NEWS_DATA.length})`;
      document.getElementById('count-paper').textContent =
        `(${NEWS_DATA.filter(n => n.category === '论文').length})`;
      document.getElementById('count-conference').textContent =
        `(${NEWS_DATA.filter(n => n.category === '学术会议').length})`;
      document.getElementById('count-award').textContent =
        `(${NEWS_DATA.filter(n => n.category === '获奖').length})`;
    }

    updateCounts();
    renderList('all');

    document.querySelectorAll('.news-filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.news-filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderList(tab.dataset.category);
      });
    });

    const params = new URLSearchParams(location.search);
    const cat = params.get('category');
    if (cat) {
      const tab = document.querySelector(`.news-filter-tab[data-category="${cat}"]`);
      if (tab) tab.click();
    }
  </script>
</body>
</html>
