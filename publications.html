  <script src="js/publications-data.js"></script>
  <script>
    function renderPubItem(pub, index) {
      const journalShort = getJournalShort(pub.journal);
      return `
        <div class="pub-item">
          <div class="pub-index">${index}</div>
          <div class="pub-body">
            <div class="pub-meta">
              <span class="pub-year">${pub.year}</span>
              <span class="pub-journal-badge">${journalShort}</span>
            </div>
            <h3 class="pub-title">${pub.title}</h3>
            <p class="pub-authors">${pub.authors}</p>
            <p class="pub-journal-full"><em>${pub.journal}</em></p>
          </div>
        </div>`;
    }

    function renderList(year) {
      const pubs = getPublicationsByYear(year);
      const list = document.getElementById('pubList');
      if (pubs.length === 0) {
        list.innerHTML = '<p class="pub-empty">该年份暂无论文记录。</p>';
        return;
      }
      list.innerHTML = pubs.map((p, i) => renderPubItem(p, i + 1)).join('');
    }

    function initYearTabs() {
      const years = getPublicationYears();
      const tabs = document.getElementById('yearTabs');
      const allTab = `<button class="year-tab active" data-year="all">全部<span class="count">(${PUBLICATIONS_DATA.length})</span></button>`;
      const yearTabs = years.map(y => {
        const count = PUBLICATIONS_DATA.filter(p => p.year === y).length;
        return `<button class="year-tab" data-year="${y}">${y}<span class="count">(${count})</span></button>`;
      }).join('');
      const beforeTab = `<button class="year-tab" data-year="before2007">≤2007<span class="count">(${PUBLICATIONS_DATA.filter(p => p.year <= 2007).length})</span></button>`;
      tabs.innerHTML = allTab + yearTabs + beforeTab;

      tabs.querySelectorAll('.year-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderList(tab.dataset.year);
        });
      });
    }

    function initStats() {
      const years = getPublicationYears();
      const estCount = PUBLICATIONS_DATA.filter(p =>
        p.journal.includes('Environmental Science')).length;
      const wrCount = PUBLICATIONS_DATA.filter(p =>
        p.journal.startsWith('Water Research')).length;
      document.getElementById('pubStats').innerHTML = `
        <div class="pub-stat-item">
          <div class="number">${PUBLICATIONS_DATA.length}</div>
          <div class="label">论文总数</div>
        </div>
        <div class="pub-stat-item">
          <div class="number">${years.length}</div>
          <div class="label">跨越年份</div>
        </div>
        <div class="pub-stat-item">
          <div class="number">${estCount}</div>
          <div class="label">EST 论文</div>
        </div>
        <div class="pub-stat-item">
          <div class="number">${wrCount}</div>
          <div class="label">Water Research</div>
        </div>`;
    }

    initStats();
    initYearTabs();
    renderList('all');

    const params = new URLSearchParams(location.search);
    const year = params.get('year');
    if (year) {
      const tab = document.querySelector(`.year-tab[data-year="${year}"]`);
      if (tab) tab.click();
    }
  </script>
</body>
